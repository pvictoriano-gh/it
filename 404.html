<!DOCTYPE html>
<html lang="en" data-mode="terminal" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Route not found</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/terminal-mode.css" />
  <style>
    .nf { max-width: 560px; margin: 0 auto; padding: 18vh 1.5rem; text-align: center; }
    .nf pre {
      font-family: var(--font-mono, ui-monospace, monospace);
      color: var(--color-muted);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 18px;
      text-align: left;
      display: inline-block;
      margin: 24px 0;
      font-size: 0.85rem;
    }
    .nf .fail { color: #c2410c; }
  </style>
</head>
<body>
  <div class="nf">
    <h1 class="hero__title" style="font-size: clamp(2rem, 8vw, 3rem);">404</h1>
    <pre>$ curl -sI https://pvictoriano-gh.github.io/it$REQUEST_URI
<span class="fail">✗</span> HTTP/1.1 404 Not Found
  → this route could not be found</pre>
    <p><a class="btn btn--primary" href="/">Back to home</a></p>
  </div>
</body>
</html>
